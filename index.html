// VIDEO GENERATION — COMPLETELY REDONE
// ═══════════════════════════════════════════════════════
async function generateVideo(prompt, imageDataUrl, engineOverride, extendVideoUrl) {
  let cancelled = false;
  const progressId = appendVideoProgress('Starting video generation...', () => { cancelled = true; });

  const engine = engineOverride || document.getElementById('vid-engine-select')?.value || 'aurora';
  const duration = parseInt(document.getElementById('vid-duration-select').value) || 8;
  const ratio = document.getElementById('vid-ratio-select').value;
  const res = document.getElementById('vid-res-select').value;

  try {
    if (engine === 'aurora' || !engine.startsWith('wan')) {
      // Prefer xAI Aurora for T2V / general use
      if (!apiKey) throw new Error('xAI API key required for Aurora video.');
      await generateVideoAuroraXAI(prompt, imageDataUrl, extendVideoUrl, duration, ratio, res, progressId, () => cancelled);
    } else {
      // Wan models via WaveSpeed
      if (!wavespeedKey) throw new Error('WaveSpeed API key required for Wan models.');
      await generateVideoWaveSpeed(prompt, imageDataUrl, extendVideoUrl, engine, progressId, () => cancelled);
    }
  } catch(e) {
    removeVideoProgress(progressId);
    if (e.message !== 'Cancelled') {
      addMessageToThread({ role: 'assistant', type: 'error', content: e.message });
      appendError(e.message);
    }
  }
}

async function generateVideoAuroraXAI(prompt, imageDataUrl, extendVideoUrl, duration, ratio, res, progressId, isCancelled) {
  let body = { model: 'grok-imagine-video', prompt, duration: Math.min(duration, 15) };

  if (extendVideoUrl) {
    body.video = extendVideoUrl;  // or reference as needed
  } else if (imageDataUrl) {
    body.image = imageDataUrl;
  } else {
    // Pure T2V — fully supported now
    body.aspect_ratio = ratio;
    body.resolution = res.toLowerCase();
  }

  const submitRes = await fetch('https://api.x.ai/v1/videos/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify(body)
  });

  if (!submitRes.ok) {
    const err = await submitRes.json().catch(() => ({}));
    throw new Error(`Aurora submit failed: ${err.error?.message || submitRes.status}`);
  }

  const { request_id } = await submitRes.json();
  if (!request_id) throw new Error('No request ID returned from xAI');

  const videoUrl = await pollForVideo(
    () => fetch(`https://api.x.ai/v1/videos/${request_id}`, { headers: { 'Authorization': `Bearer ${apiKey}` } }),
    data => {
      if (data.status === 'done' || data.status === 'completed') return data.video?.url || data.output?.url || null;
      if (data.status === 'failed' || data.status === 'error') throw new Error('Generation failed on xAI side');
      return null;
    },
    progressId, isCancelled
  );

  if (videoUrl) {
    addMessageToThread({ role: 'assistant', type: 'video', src: videoUrl, alt: prompt });
    renderVideo(videoUrl, prompt);
  }
}

// WaveSpeed Wan logic (improved + kept original compatibility)
async function generateVideoWaveSpeed(prompt, imageDataUrl, extendVideoUrl, engine, progressId, isCancelled) {
  // ... (original Wan logic with minor robustness improvements - kept mostly intact) ...
  const duration = parseInt(document.getElementById('vid-duration-select').value);
  const res = document.getElementById('vid-res-select').value;
  const ratio = document.getElementById('vid-ratio-select').value;

  let modelPath, body;

  if (extendVideoUrl) {
    modelPath = 'wavespeed-ai/wan-2.2-spicy/video-extend';
    body = { prompt, video: extendVideoUrl, resolution: res, duration: Math.min(duration, 8), seed: -1 };
  } else if (imageDataUrl) {
    modelPath = engine === 'wan26spicy' ? 'alibaba/wan-2.6/image-to-video-spicy' : 'wavespeed-ai/wan-2.2-spicy/image-to-video';
    const wanDuration = engine === 'wan26spicy' ? Math.min(duration, 15) : Math.min(duration, 5);
    body = { prompt, image: imageDataUrl, resolution: res, duration: wanDuration, aspect_ratio: ratio, seed: -1 };
  } else if (engine === 'wan26t2v') {
    modelPath = 'alibaba/wan-2.6/text-to-video';
    body = { prompt, resolution: res, duration: Math.min(duration, 15), aspect_ratio: ratio, seed: -1, enable_prompt_expansion: false };
  } else {
    throw new Error('Selected Wan engine requires an image input. Use Aurora for pure text-to-video or Animate an image first.');
  }

  // Submit + poll logic (same as before but with better error messages)
  const submitRes = await fetch(`https://api.wavespeed.ai/api/v3/${modelPath}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${wavespeedKey}` },
    body: JSON.stringify(body)
  });

  if (!submitRes.ok) throw new Error(`WaveSpeed submit error ${submitRes.status}`);

  const submitData = await submitRes.json();
  const taskId = submitData.data?.id || submitData.id;
  if (!taskId) throw new Error('No task ID from WaveSpeed');

  const videoUrl = await pollForVideo(
    () => fetch(`https://api.wavespeed.ai/api/v3/predictions/${taskId}/result`, { headers: { 'Authorization': `Bearer ${wavespeedKey}` } }),
    data => {
      const status = data.data?.status || data.status;
      if (status === 'completed') return data.data?.outputs?.[0] || data.outputs?.[0];
      if (status === 'failed') throw new Error('WaveSpeed generation failed');
      return null;
    },
    progressId, isCancelled
  );

  if (videoUrl) {
    addMessageToThread({ role: 'assistant', type: 'video', src: videoUrl, alt: prompt });
    renderVideo(videoUrl, prompt);
  }
}

// Polling, renderVideo, buildAnimatePanel, save functions — kept + minor improvements
// (unchanged from original except better progress text)

async function pollForVideo(fetchFn, extractFn, progressId, isCancelled) {
  let elapsed = 0;
  const pollInterval = 4000; // slightly faster
  const maxElapsed = 900000; // 15 min

  while (elapsed < maxElapsed) {
    await new Promise(r => setTimeout(r, pollInterval));
    elapsed += pollInterval;

    if (isCancelled()) { removeVideoProgress(progressId); return null; }

    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    updateVideoProgress(progressId, `Generating... ${mins}m ${secs}s`);

    try {
      const res = await fetchFn();
      if (!res.ok) continue;
      const data = await res.json();
      const result = extractFn(data);
      if (result) { 
        removeVideoProgress(progressId); 
        return result; 
      }
    } catch(e) {
      if (e.message.includes('failed')) throw e;
    }
  }
  throw new Error('Video generation timed out');
}
